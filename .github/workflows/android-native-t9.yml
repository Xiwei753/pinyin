name: Android Native T9 Build

on:
  push:
    paths:
      - 'frontends/android-ime/native-app/**'
      - 'tools/dictionary/**'
      - 'third_party/rime-ice/**'
      - '.github/workflows/android-native-t9.yml'
  pull_request:
    paths:
      - 'frontends/android-ime/native-app/**'
      - 'tools/dictionary/**'
      - 'third_party/rime-ice/**'
      - '.github/workflows/android-native-t9.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Fetch rime-ice dictionary
        run: |
          if [ ! -f "third_party/rime-ice/cn_dicts/base.dict.yaml" ]; then
            echo "third_party/rime-ice not populated by checkout; shallow cloning public repo..."
            rm -rf third_party/rime-ice
            git clone --depth 1 https://github.com/iDvel/rime-ice.git third_party/rime-ice
          fi
          echo "Checking required dictionary files..."
          if [ ! -f "third_party/rime-ice/cn_dicts/base.dict.yaml" ]; then
            echo "Error: base.dict.yaml not found"
            exit 1
          fi
          if [ ! -f "third_party/rime-ice/cn_dicts/8105.dict.yaml" ]; then
            echo "Error: 8105.dict.yaml not found"
            exit 1
          fi
          echo "Both dictionary files present."

      - name: Verify T9 Dictionary Asset Script
        run: |
          python3 tools/dictionary/build_t9_assets.py --out-dir /tmp/t9AssetsCheck
          if [ ! -f "/tmp/t9AssetsCheck/t9_source_dict.tsv" ]; then
            echo "Error: t9_source_dict.tsv was not generated"
            exit 1
          fi
          if [ ! -f "/tmp/t9AssetsCheck/t9_dict.db" ]; then
            echo "Error: t9_dict.db was not generated"
            exit 1
          fi
          python3 -c "import sqlite3; conn = sqlite3.connect('/tmp/t9AssetsCheck/t9_dict.db'); count = conn.execute('SELECT COUNT(*) FROM entries').fetchone()[0]; print(f'Database has {count} entries'); assert count > 30000; conn.close()"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x frontends/android-ime/native-app/android/gradlew

      - name: Build Debug APK
        run: |
          cd frontends/android-ime/native-app/android
          ./gradlew test assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: xiwei-t9-debug-apk
          path: frontends/android-ime/native-app/android/app/build/outputs/apk/debug/app-debug.apk
