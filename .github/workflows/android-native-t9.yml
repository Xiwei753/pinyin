name: Android Native T9 Build

on:
  push:
    paths:
      - 'frontends/android-ime/native-app/**'
      - '.github/workflows/android-native-t9.yml'
  pull_request:
    paths:
      - 'frontends/android-ime/native-app/**'
      - '.github/workflows/android-native-t9.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x frontends/android-ime/native-app/android/gradlew

      - name: Build Debug APK
        run: |
          cd frontends/android-ime/native-app/android
          ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: xiwei-t9-debug-apk
          path: frontends/android-ime/native-app/android/app/build/outputs/apk/debug/app-debug.apk
