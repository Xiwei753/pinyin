name: Validate and Package

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y zip unzip python3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Android T9 Dictionary Assets
      run: |
        python3 tools/dictionary/build_t9_assets.py
        git diff --exit-code frontends/android-ime/native-app/android/app/src/main/assets/t9_source_dict.tsv

    - name: Run Android Validations and Tests
      run: |
        python tools/validate/check-all.py
        cd frontends/android-ime/native-app/android
        ./gradlew test assembleDebug

    - name: Upload Android Native T9 APK
      uses: actions/upload-artifact@v4
      with:
        name: xiwei-t9-debug-apk
        path: frontends/android-ime/native-app/android/app/build/outputs/apk/debug/app-debug.apk
