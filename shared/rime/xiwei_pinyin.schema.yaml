# Rime schema for Xiwei Pinyin
schema:
  schema_id: xiwei_pinyin
  name: "希为拼音"
  version: "0.1"
  author:
    - Xiwei
  description: |
    Personal customized Pinyin schema.

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: simplification
    reset: 1
    states: [ 漢字, 汉字 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - custom_phrase
    - script_translator
  filters:
    - simplifier
    - uniquifier

custom_phrase:
  dictionary: ""
  user_dict: custom_phrase
  db_class: stabledb
  enable_completion: false
  enable_sentence: false
  initial_quality: 10

menu:
  page_size: 5

speller:
  alphabet: abcdefghijklmnopqrstuvwxyz
  initials: abcdefghijklmnopqrstuvwxyz
  delimiter: " '"
  algebra:
    - erase/^xx$/

translator:
  dictionary: luna_pinyin
  prism: luna_pinyin
  enable_completion: true
  enable_sentence: true
  enable_user_dict: true
  spelling_hints: 9
  preedit_format:
    - xform/([nl])v/$1ü/
