# Rime schema for Xiwei Pinyin
schema:
  schema_id: xiwei_pinyin
  name: "希为拼音"
  version: "0.1"
  author:
    - Xiwei
  description: |
    Personal customized Pinyin schema.

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"
  algebra:
    - erase/^xx$/

translator:
  dictionary: xiwei_pinyin
  prism: xiwei_pinyin
  preedit_format:
    - xform/([nl])v/$1ü/
