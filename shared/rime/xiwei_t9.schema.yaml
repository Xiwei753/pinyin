# Rime schema for Xiwei T9 (Nine-key Pinyin)
schema:
  schema_id: xiwei_t9
  name: "希为九宫格"
  version: "0.1"
  author:
    - Xiwei
  description: |
    Personal customized T9 Pinyin schema.

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator

speller:
  alphabet: "0123456789"
  delimiter: " '"

translator:
  dictionary: xiwei_pinyin
